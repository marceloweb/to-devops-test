global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "app1"
    metrics_path: /metrics
    static_configs:
      - targets: ["app1:8080"]

  - job_name: "app2"
    metrics_path: /metrics
    static_configs:
      - targets: ["app2:8081"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]